# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
#
# IMPORTANT: All values referenced via `secret:` below must exist in
# Google Cloud Secret Manager BEFORE the first deploy. Create them with:
#
#   firebase apphosting:secrets:set <NAME>
#
# Then grant the App Hosting backend access:
#
#   firebase apphosting:secrets:grantaccess <NAME> --backend <BACKEND_ID>

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  # --- Site ---
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://themarkest.me
    availability:
      - BUILD
      - RUNTIME

  # --- Firebase Web SDK (public, but kept in Secret Manager for hygiene) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID — add when Analytics is enabled in console
  # FIREBASE_SERVICE_ACCOUNT_JSON — not needed: App Hosting auto-injects ADC at runtime
