<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>
  
  <!-- Letter M with cyberpunk style -->
  <text x="100" y="130" font-family="'Handjet', 'JetBrains Mono', monospace" font-size="120" font-weight="800" fill="url(#logoGradient)" text-anchor="middle" filter="url(#glow)">M</text>
  
  <!-- Accent lines -->
  <line x1="30" y1="180" x2="80" y2="180" stroke="#ff0040" stroke-width="3" opacity="0.8"/>
  <line x1="120" y1="180" x2="170" y2="180" stroke="#00d9ff" stroke-width="3" opacity="0.8"/>
  
  <!-- Dots -->
  <circle cx="20" cy="30" r="4" fill="#00d9ff" opacity="0.6"/>
  <circle cx="180" cy="30" r="4" fill="#ff0040" opacity="0.6"/>
  <circle cx="20" cy="170" r="3" fill="#00ff41" opacity="0.5"/>
  <circle cx="180" cy="170" r="3" fill="#ff00ff" opacity="0.5"/>
</svg>
