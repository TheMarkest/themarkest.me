<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff0040" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main Title -->
  <text 
    x="600" 
    y="250" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="120" 
    font-weight="bold" 
    fill="url(#text-grad)" 
    text-anchor="middle"
    filter="url(#glow)"
  >МАРК БОГДАНОВ</text>
  
  <!-- Subtitle -->
  <text 
    x="600" 
    y="350" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="36" 
    fill="#00d9ff" 
    text-anchor="middle"
    opacity="0.9"
  >кибер-мастер на все руки</text>
  
  <!-- Description -->
  <text 
    x="600" 
    y="420" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="24" 
    fill="#ffffff" 
    text-anchor="middle"
    opacity="0.7"
  >IT Project Manager • CTO • Mentor • Speaker</text>
  
  <!-- Website -->
  <text 
    x="600" 
    y="520" 
    font-family="monospace" 
    font-size="28" 
    fill="#ff00ff" 
    text-anchor="middle"
    filter="url(#glow)"
  >themarkest.me</text>
  
  <!-- Border -->
  <rect 
    x="10" 
    y="10" 
    width="1180" 
    height="610" 
    fill="none" 
    stroke="url(#text-grad)" 
    stroke-width="4"
  />
  
  <!-- Corner accents -->
  <path d="M 10 10 L 80 10 M 10 10 L 10 80" stroke="#00d9ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M 1190 10 L 1120 10 M 1190 10 L 1190 80" stroke="#ff0040" stroke-width="6" stroke-linecap="round"/>
  <path d="M 10 620 L 80 620 M 10 620 L 10 550" stroke="#ff00ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M 1190 620 L 1120 620 M 1190 620 L 1190 550" stroke="#00ff41" stroke-width="6" stroke-linecap="round"/>
</svg>