<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad-180" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1"/>
    </linearGradient>
    
    <filter id="glow-180">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="#000000"/>
  
  <!-- Text -->
  <text 
    x="50%" 
    y="50%" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="108" 
    font-weight="bold" 
    fill="url(#grad-180)" 
    text-anchor="middle" 
    dominant-baseline="central"
    filter="url(#glow-180)"
  >M</text>
  
  <!-- Border -->
  <rect 
    x="4.5" 
    y="4.5" 
    width="171" 
    height="171" 
    fill="none" 
    stroke="url(#grad-180)" 
    stroke-width="9"
  />
</svg>